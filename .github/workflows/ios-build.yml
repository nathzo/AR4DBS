name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from the GitHub website

jobs:
  build-ios:
    runs-on: macos-15   # latest macOS with Xcode 17, supports iOS 26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt (macOS desktop — required by iOS kit)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.11.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'
          cache: true

      - name: Install Qt (iOS)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.11.0'
          host: 'mac'
          target: 'ios'
          modules: 'qtmultimedia'
          cache: true

      - name: Locate Qt paths
        run: |
          echo "=== All Qt6Config.cmake files ==="
          find /Users/runner /opt -name "Qt6Config.cmake" 2>/dev/null | head -10

          IOS_CMAKE=$(find /Users/runner /opt -name "Qt6Config.cmake" -path "*/ios/*" 2>/dev/null | head -1)
          HOST_CMAKE=$(find /Users/runner /opt -name "Qt6Config.cmake" \( -path "*/macos/*" -o -path "*/clang_64/*" \) 2>/dev/null | head -1)

          if [ -z "$IOS_CMAKE" ]; then
            echo "ERROR: could not find iOS Qt6Config.cmake"
            exit 1
          fi

          QT_IOS="${IOS_CMAKE%/lib/cmake/Qt6/Qt6Config.cmake}"
          QT_HOST="${HOST_CMAKE%/lib/cmake/Qt6/Qt6Config.cmake}"

          echo "Qt iOS : $QT_IOS"
          echo "Qt Host: $QT_HOST"

          echo "QT_IOS=$QT_IOS"   >> $GITHUB_ENV
          echo "QT_HOST=$QT_HOST" >> $GITHUB_ENV

      - name: Download OpenCV iOS framework
        run: |
          curl -L https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-ios-framework.zip \
               -o opencv-ios.zip
          unzip -q opencv-ios.zip -d $HOME/opencv-ios

      - name: Download ONNX Runtime iOS
        run: |
          curl -L https://onnxruntimepackages.z14.web.core.windows.net/pod-archive-onnxruntime-mobile-c-1.18.0.zip \
               -o ort-ios.zip
          unzip -q ort-ios.zip -d $HOME/onnxruntime-ios

      - name: Inspect Qt iOS lib (FFmpeg discovery)
        run: |
          echo "=== ffmpeg/ xcframeworks ==="
          ls "$QT_IOS/lib/ffmpeg/"
          echo "=== libavcodec.xcframework full tree ==="
          find "$QT_IOS/lib/ffmpeg/libavcodec.xcframework" | head -40

      - name: Configure CMake
        run: |
          cmake -S . -B build-ios \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$QT_IOS/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="$QT_HOST" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DOPENCV_FRAMEWORK=$HOME/opencv-ios \
            -DONNXRUNTIME_ROOT=$HOME/onnxruntime-ios \
            -DFEATURE_PLAN_SCANNER=ON \
            2>&1 | tee cmake-configure.log
          # Fail immediately if FFmpeg was not resolved — saves 30 min waiting for link errors
          if grep -q "sws_\|av_\* symbols will be unresolved\|FFmpeg xcframework slices found" cmake-configure.log; then
            echo "ERROR: FFmpeg not linked — check cmake-configure.log above"
            exit 1
          fi
          echo "=== FFmpeg discovery result ==="
          grep "Qt FFmpeg:" cmake-configure.log || echo "(no Qt FFmpeg lines — check for warnings above)"

      - name: Build
        run: |
          xcodebuild \
            -project build-ios/DBSAR.xcodeproj \
            -scheme DBSAR \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build-ios/Release-iphoneos/DBSAR.app Payload/
          zip -r DBSAR.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DBSAR-ios
          path: DBSAR.ipa
          retention-days: 7
