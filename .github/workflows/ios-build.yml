name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from the GitHub website

jobs:
  build-ios:
    runs-on: macos-15   # latest macOS with Xcode 17, supports iOS 26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Qt installation (cached with a fixed key so it never drifts) ──────────
      # We manage the cache ourselves rather than relying on install-qt-action's
      # built-in caching, whose key changes with the runner image and action
      # internals, causing an 8-minute re-download on every run.
      - name: Restore Qt from cache
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: ~/Qt
          key: qt-6.11.0-macos-ios-qtmultimedia-v1

      - name: Install Qt (desktop + iOS)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt mac desktop 6.11.0 clang_64 -m qtmultimedia -O ~/Qt
          aqt install-qt mac ios     6.11.0 ios      -m qtmultimedia -O ~/Qt

      - name: Locate Qt paths
        run: |
          IOS_CMAKE=$(find ~/Qt -name "Qt6Config.cmake" -path "*/ios/*" | head -1)
          HOST_CMAKE=$(find ~/Qt -name "Qt6Config.cmake" \( -path "*/macos/*" -o -path "*/clang_64/*" \) | head -1)

          if [ -z "$IOS_CMAKE" ]; then
            echo "ERROR: could not find iOS Qt6Config.cmake"
            exit 1
          fi

          QT_IOS="${IOS_CMAKE%/lib/cmake/Qt6/Qt6Config.cmake}"
          QT_HOST="${HOST_CMAKE%/lib/cmake/Qt6/Qt6Config.cmake}"

          echo "Qt iOS : $QT_IOS"
          echo "Qt Host: $QT_HOST"

          echo "QT_IOS=$QT_IOS"   >> $GITHUB_ENV
          echo "QT_HOST=$QT_HOST" >> $GITHUB_ENV

      # ── Third-party dependencies (also cached) ────────────────────────────────
      - name: Restore OpenCV iOS from cache
        id: opencv-cache
        uses: actions/cache@v4
        with:
          path: ~/opencv-ios
          key: opencv-4.10.0-ios-framework

      - name: Download OpenCV iOS framework
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-ios-framework.zip \
               -o opencv-ios.zip
          unzip -q opencv-ios.zip -d ~/opencv-ios

      # ── CoreML depth model conversion ─────────────────────────────────────────
      # Convert resources/model-small.onnx (MiDaS) to CoreML format so it can be
      # bundled directly into the app and loaded by CoreMLDepthEstimator at runtime.
      # The result is cached by ONNX file hash — re-conversion only happens when
      # the model changes. Build succeeds without a model (depth disabled at runtime).

      - name: Restore converted CoreML model from cache
        id: coreml-cache
        uses: actions/cache@v4
        with:
          path: resources/model-small.mlmodel
          key: coreml-midas-small-${{ hashFiles('resources/model-small.onnx') }}

      - name: Convert MiDaS ONNX to CoreML
        if: steps.coreml-cache.outputs.cache-hit != 'true'
        run: |
          if [ ! -f resources/model-small.onnx ]; then
            echo "model-small.onnx not found — skipping CoreML conversion (depth disabled)"
            exit 0
          fi
          python3 -m venv /tmp/coreml-venv
          /tmp/coreml-venv/bin/pip install --quiet "coremltools>=7.0" onnx
          /tmp/coreml-venv/bin/python3 -c "import coremltools as ct; model = ct.convert('resources/model-small.onnx', minimum_deployment_target=ct.target.iOS14); model.save('resources/model-small.mlmodel'); print('Saved: resources/model-small.mlmodel')"

      # ── Configure ─────────────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          # Pass the CoreML model to cmake when the conversion succeeded.
          # Xcode will compile model-small.mlmodel → model-small.mlmodelc and
          # place it in the app bundle's Resources/ directory automatically.
          COREML_ARG=""
          if [ -f resources/model-small.mlmodel ]; then
            COREML_ARG="-DCOREML_DEPTH_MODEL=$(pwd)/resources/model-small.mlmodel"
            echo "CoreML model found — depth occlusion will be bundled"
          else
            echo "CoreML model not found — depth occlusion disabled in this build"
          fi

          cmake -S . -B build-ios \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$QT_IOS/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="$QT_HOST" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DOPENCV_FRAMEWORK=$HOME/opencv-ios \
            -DFEATURE_PLAN_SCANNER=ON \
            $COREML_ARG \
            2>&1 | tee cmake-configure.log
          # Fail immediately if FFmpeg was not resolved — saves 30 min on link errors
          if grep -q "symbols will be unresolved\|no FFmpeg frameworks found" cmake-configure.log; then
            echo "ERROR: FFmpeg not linked — check cmake-configure.log above"
            exit 1
          fi
          echo "=== FFmpeg discovery result ==="
          grep "Qt FFmpeg:" cmake-configure.log || echo "(no Qt FFmpeg lines — check for warnings above)"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: |
          xcodebuild \
            -project build-ios/DBSAR.xcodeproj \
            -scheme DBSAR \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      # ── Verify binary before packaging ───────────────────────────────────────
      - name: Verify dynamic library linking
        run: |
          APP_BIN="build-ios/Release-iphoneos/DBSAR.app/DBSAR"
          if [ ! -f "$APP_BIN" ]; then
            echo "ERROR: binary not found at $APP_BIN"
            exit 1
          fi

          echo "=== Dynamic library dependencies (otool -L) ==="
          otool -L "$APP_BIN"
          echo ""

          echo "=== LC_RPATH entries ==="
          otool -l "$APP_BIN" | grep -A2 "LC_RPATH" || echo "(no LC_RPATH entries)"
          echo ""

          echo "=== Frameworks embedded in app bundle ==="
          ls build-ios/Release-iphoneos/DBSAR.app/Frameworks/ 2>/dev/null \
            || echo "(Frameworks/ directory not present — nothing embedded)"
          echo ""

          # --- Decision logic ---
          if otool -L "$APP_BIN" | grep -q "libavcodec"; then
            echo "FFmpeg is dynamically linked."

            # Check 1: @executable_path/Frameworks must be in LC_RPATH
            if otool -l "$APP_BIN" | grep -q "@executable_path/Frameworks"; then
              echo "OK  LC_RPATH contains @executable_path/Frameworks"
            else
              echo "FAIL @executable_path/Frameworks is NOT in LC_RPATH"
              echo "     dyld will not find the embedded frameworks on device — app will crash."
              exit 1
            fi

            # Check 2: the framework must actually be in the bundle
            if [ -d "build-ios/Release-iphoneos/DBSAR.app/Frameworks/libavcodec.framework" ]; then
              echo "OK  libavcodec.framework is embedded in the app bundle"
            else
              echo "FAIL libavcodec.framework is NOT in DBSAR.app/Frameworks/"
              echo "     XCODE_EMBED_FRAMEWORKS did not run — app will crash."
              exit 1
            fi

            echo ""
            echo "All checks passed — sideloaded app should NOT crash at launch."
          else
            echo "FFmpeg appears to be statically linked (no libavcodec in otool -L)."
            echo "No embedding checks needed."
          fi

          # --- CoreML model checks ---
          echo ""
          echo "=== CoreML depth model in bundle ==="
          if ls build-ios/Release-iphoneos/DBSAR.app/*.mlmodelc 2>/dev/null \
          || ls build-ios/Release-iphoneos/DBSAR.app/Resources/*.mlmodelc 2>/dev/null; then
            echo "OK  CoreML model bundled — depth occlusion active at runtime"
          else
            echo "INFO CoreML model not bundled — depth occlusion disabled at runtime"
            echo "     (add model-small.onnx to the repo to enable)"
          fi

          # --- Info.plist checks ---
          PLIST="build-ios/Release-iphoneos/DBSAR.app/Info.plist"
          echo ""
          echo "=== Info.plist privacy keys ==="
          if [ ! -f "$PLIST" ]; then
            echo "FAIL Info.plist not found in app bundle"
            exit 1
          fi
          if /usr/libexec/PlistBuddy -c "Print NSCameraUsageDescription" "$PLIST" 2>/dev/null; then
            echo "OK  NSCameraUsageDescription is present — camera permission prompt will appear"
          else
            echo "FAIL NSCameraUsageDescription is MISSING from Info.plist"
            echo "     iOS will crash the app the moment camera access is attempted."
            exit 1
          fi

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build-ios/Release-iphoneos/DBSAR.app Payload/
          zip -r DBSAR.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DBSAR-ios
          path: DBSAR.ipa
          retention-days: 7
